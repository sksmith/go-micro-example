# Local-development stack only. Credentials default to dev values for
# convenience but accept overrides via env vars (or a gitignored .env
# file in this directory). Do not run this compose file in production.
services:
  postgres:
    image: postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-go-micro-example-db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 2s
      timeout: 2s
      retries: 30

  pgadmin:
    image: dpage/pgadmin4
    depends_on:
      - postgres
    ports:
      - "9090:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}

  rabbitmq:
    # 3.9 reached EOL; 4.0 is the current supported series.
    image: rabbitmq:4.0-management-alpine
    container_name: 'rabbitmq'
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      # DSN-015: declare exchanges/queues/bindings so the app's
      # publishers and consumers find what they need on first boot.
      # Replaces the old scripts/setup-rmq.sh curl workflow.
      - ./scripts/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./scripts/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      # check_running is stricter than ping: it returns true only after
      # rabbit_app has fully booted (mnesia ready, AMQP listener up,
      # definitions loaded).
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s

  redpanda:
    # DSN-016: Kafka transport. Redpanda is a single-binary
    # Kafka-API-compatible broker that boots fast — ideal for
    # docker-compose demos. The schema registry is intentionally not
    # enabled here; messages are JSON envelopes (events.Envelope) and
    # validation runs against the in-repo JSON Schemas (DSN-012).
    image: redpandadata/redpanda:v24.2.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      # Advertise both an internal listener (other compose services)
      # and an external listener (host curl/scripts).
      - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 5s

  redis:
    # DSN-020: Redis cache for the inventory read path. The image
    # ships with a sensible default config; the demo uses an
    # ephemeral, unauthenticated instance which is appropriate for
    # local dev and intentionally not for prod.
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  stub-catalog:
    # DSN-018: tiny upstream the outbound-REST client demo calls.
    # Serves GET /products/{sku} and GET /flaky/{sku} (the latter
    # fails twice before succeeding, exercising the retry branch).
    # No in-image healthcheck (scratch base, no shell). The app side
    # treats catalog as best-effort enrichment, so start ordering
    # via `service_started` is enough.
    build:
      context: .
      dockerfile: Dockerfile.stub-catalog
    ports:
      - "9100:9100"

  app:
    build:
      context: .
      args:
        # Surface git metadata into the binary so the demo banner
        # shows real values instead of NOT_SUPPLIED.
        VER: ${VER:-dev}
        SHA1: ${SHA1:-dev}
        NOW: ${NOW:-unknown}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      stub-catalog:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      # In compose, postgres and rabbitmq are reachable via their
      # service names — config.yml's localhost defaults need to be
      # overridden via env. db.user/pass and rabbitmq.user/pass are
      # required anyway (SEC-004).
      GME_DB_HOST: postgres
      GME_DB_PORT: "5432"
      GME_DB_USER: ${POSTGRES_USER:-postgres}
      GME_DB_PASS: ${POSTGRES_PASSWORD:-postgres}
      GME_RABBITMQ_HOST: rabbitmq
      GME_RABBITMQ_PORT: "5672"
      GME_RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      GME_RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      # Stable signing key so the demo doesn't print a "tokens will
      # not survive a restart" warning. 32 bytes of dev-only material.
      GME_JWT_SIGNING_KEY: ${GME_JWT_SIGNING_KEY:-demo-only-jwt-signing-key-do-not-use}
      # DSN-016: Kafka brokers + topics (events go out, commands come
      # in). Topics auto-create on first publish/subscribe in Redpanda.
      GME_KAFKA_BROKERS: redpanda:29092
      GME_KAFKA_EVENTS_TOPIC: inventory.product-quantity-changed.v1
      GME_KAFKA_COMMANDS_TOPIC: inventory.commands.v1
      GME_KAFKA_DLT_TOPIC: inventory.commands.v1.dlt
      GME_KAFKA_CONSUMER_GROUP: inventory-service
      # DSN-018: outbound REST. Empty URL disables the catalog client
      # entirely; the inventory API serves unenriched responses.
      GME_CATALOG_BASEURL: http://stub-catalog:9100
      # DSN-020: Redis cache for the inventory read path. Empty URL
      # disables the cache; the inventory API serves DB reads directly.
      GME_REDIS_URL: redis://redis:6379/0
      # DSN-015: deterministic admin so the demo orchestrator can
      # exchange Basic creds for a JWT without scraping logs.
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-admin}
    # No in-container healthcheck: the scratch image has no shell or
    # wget. The demo container polls /ready itself before running
    # steps (cmd/demo/main.go: waitReady), so the gate is enforced
    # there rather than via Docker's HEALTHCHECK.

  demo:
    # DSN-015: orchestrator that runs each capability step end-to-end
    # against the live app and prints a summary table. Exits 0 on
    # success, non-zero on any step failure.
    build:
      context: .
      dockerfile: Dockerfile.demo
    depends_on:
      app:
        condition: service_started
    environment:
      DEMO_BASE_URL: http://app:8080
      DEMO_ADMIN_USER: admin
      DEMO_ADMIN_PASS: ${BOOTSTRAP_ADMIN_PASSWORD:-admin}
      DEMO_KAFKA_BROKERS: redpanda:29092
      DEMO_KAFKA_COMMANDS_TOPIC: inventory.commands.v1
      DEMO_KAFKA_EVENTS_TOPIC: inventory.product-quantity-changed.v1
      DEMO_KAFKA_DEMO_GROUP: demo-watcher
    # The container exits when the demo finishes (0 on success, non-0
    # on any step failure). 'docker-compose up' shows the summary in
    # the demo service's log stream; the app keeps running for
    # interactive use afterwards.
    restart: "no"
