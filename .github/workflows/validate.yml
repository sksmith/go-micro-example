name: Validate
on:
  pull_request:
    branches:
      - master
permissions:
  contents: read
  security-events: write
jobs:
  lint:
    uses: ./.github/workflows/lint.yml
  security:
    uses: ./.github/workflows/sec.yml
  vuln:
    uses: ./.github/workflows/vuln.yml
  secret:
    uses: ./.github/workflows/secret.yml
  trivy:
    uses: ./.github/workflows/trivy.yml
  test:
    uses: ./.github/workflows/test.yml
  openapi:
    uses: ./.github/workflows/openapi.yml
  notify:
    name: Notification
    needs: [lint, security, vuln, secret, trivy, test, openapi]
    runs-on: ubuntu-latest
    steps:
      - uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          username: Dev Deployment
          description: A deployment to the development environment has been attempted
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
