name: Sec
on:
  workflow_call:
permissions:
  contents: read
  security-events: write
jobs:
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Tooling Go matches project Go after DEP-001.
          go-version-file: go.mod
          cache: true
      - name: Run gosec
        uses: securego/gosec@v2.26.1
        with:
          # SARIF for the Security tab; -severity high gates the exit code
          # so the job fails only on High/Critical findings.
          args: '-fmt sarif -out gosec.sarif -severity high ./...'
      - name: Upload SARIF
        if: ${{ always() && hashFiles('gosec.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif
          category: gosec
