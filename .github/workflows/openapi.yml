name: OpenAPI
on:
  workflow_call:
permissions:
  contents: read
jobs:
  drift:
    name: openapi-drift-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install OpenAPI tooling
        run: |
          go install github.com/swaggo/swag/v2/cmd/swag@latest
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
      # swag's --parseDependency walks dependent module sources to
      # resolve struct types; without a populated module cache it
      # exits with "cannot find all dependencies, <nil>".
      - name: Warm module cache
        run: go mod download
      - name: Regenerate spec + Go client and fail on drift
        run: make openapi-check
