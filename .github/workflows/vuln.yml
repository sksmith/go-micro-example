name: Vuln
on:
  workflow_call:
permissions:
  contents: read
  security-events: write
jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Tooling Go, not project Go — govulncheck v1.3 needs >= 1.25.
          # The vuln scan analyses source statically and works against any
          # project Go version. DEP-001 will close the gap.
          go-version: '1.25'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
      - name: Run govulncheck (SARIF)
        # SARIF mode emits findings without exiting non-zero, so the upload
        # step always runs. The Fail step below decides whether the job fails.
        run: govulncheck -format sarif ./... > govulncheck.sarif
      - name: Upload SARIF
        if: ${{ always() && hashFiles('govulncheck.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck
      # SEC-014: govulncheck is now a hard gate, matching `make verify`
      # locally. DEP-001 and DEP-002 have landed and the go.mod toolchain
      # pin is up to date, so the previously-deferred stdlib findings are
      # cleared. A new finding here should block the merge — bump
      # go.mod's toolchain directive (or the offending dependency) and
      # the gate clears again.
      - name: Run govulncheck (text)
        run: govulncheck ./...
