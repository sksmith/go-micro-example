# K8S-001: Tier 1 dry-run validation gate. Stands a kind cluster up
# and dry-run-applies the base + local overlay so admission / RBAC /
# label issues are caught before merge.
#
# Path-filtered to `deploy/**` plus this workflow so it doesn't run
# on PRs that don't touch the manifests.
name: k8s-validate
on:
  pull_request:
    branches:
      - master
    paths:
      - 'deploy/**'
      - '.github/workflows/k8s-validate.yml'
permissions:
  contents: read
jobs:
  validate:
    name: kind dry-run apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create kind cluster
        # helm/kind-action v1.14.0 — pinned by commit SHA so a tag
        # repoint can't silently change what runs in CI.
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: go-micro-example
          config: deploy/kind/cluster.yaml
      - name: Install yq
        # yq strips external-secrets.io/v1 resources (ExternalSecret +
        # ClusterSecretStore) from the render before dry-run-apply —
        # the ESO CRDs aren't installed in this Tier 1 cluster (the
        # operator install is part of the real `make k8s-up` flow), so
        # applying them would 404.
        run: sudo snap install yq
      - name: Ensure target namespace exists
        run: kubectl get namespace go-micro-example >/dev/null 2>&1 || kubectl create namespace go-micro-example
      - name: Dry-run apply (base)
        run: |
          kubectl kustomize --load-restrictor=LoadRestrictionsNone deploy/base \
            | yq 'select(.apiVersion != "external-secrets.io/v1")' \
            | kubectl apply --dry-run=server -f -
      - name: Dry-run apply (local overlay)
        # K8S-002: validate the local overlay's image rewrite + patches
        # against the same apiserver. No image is loaded — dry-run=server
        # only exercises kustomize rendering and admission.
        run: |
          kubectl kustomize --load-restrictor=LoadRestrictionsNone deploy/overlays/local \
            | yq 'select(.apiVersion != "external-secrets.io/v1")' \
            | kubectl apply --dry-run=server -f -
