port: 8080
profile: local

config:
  source: local
  print: false

log:
  level: debug
  structured: false

db:
  name: go-micro-example-db
  host: localhost
  port: 5432
  # user / pass intentionally unset; supply via env vars
  # GME_DB_USER and GME_DB_PASS or via config.local.yml (gitignored).
  clean: false
  logLevel: warn
  pool:
    minSize: 1
    maxSize: 3

rabbitmq:
  host: localhost
  port: 5672
  # user / pass intentionally unset; supply via env vars
  # GME_RABBITMQ_USER and GME_RABBITMQ_PASS or via config.local.yml.
  inventory:
    exchange: inventory.exchange
  reservation:
    exchange: reservation.exchange
  product:
    queue: product.queue
    dlt:
      exchange: product.dlt.exchange
