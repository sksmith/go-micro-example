# K8S-005: ClusterSecretStore named `vault-backend` — matches the
# name the base ExternalSecret references (deploy/base/external
# secret.yaml). Authenticated against the dev Vault via a static
# root token stored in the in-cluster Secret below.
#
# The dev-token auth path is fine for a throwaway cluster; a real
# environment must swap to Kubernetes auth (a ServiceAccount-bound
# auth role) or AppRole. Documented as out-of-scope per the
# K8S-005 ticket; copying this manifest into a staging overlay
# would be a security incident.
apiVersion: v1
kind: Secret
metadata:
  name: vault-root-token
  # Lives alongside Vault in `go-micro-example`. The overlay's
  # kustomization sets `namespace: go-micro-example`, which forces
  # this Secret into that namespace regardless of what's declared
  # here; the ClusterSecretStore below references it explicitly by
  # name + namespace so the cluster-scoped store can find it.
type: Opaque
stringData:
  token: root
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: http://vault.go-micro-example.svc:8200
      path: kv
      # KV v2 — the bootstrap Job uses `vault kv put`, which writes
      # to KV v2 by default. Match here so ESO reads from the same
      # mount layout.
      version: v2
      auth:
        tokenSecretRef:
          name: vault-root-token
          namespace: go-micro-example
          key: token
