# K8S-002: Local overlay. Swaps the GHCR image reference for a
# locally-built `go-micro-example:dev` tag and tells the kubelet
# to use whatever's already in the node's container store instead
# of trying to pull from a registry (the image lives in kind's
# containerd, loaded by `make docker-load`).
#
# K8S-003 will extend this same overlay with in-cluster Postgres /
# RabbitMQ and a plain Secret that replaces the base ExternalSecret;
# until that lands, applying this overlay produces a pod that pulls
# its image cleanly but CrashLoopBackOffs because no DB / AMQP exist.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The base's `namespace:` directive only applies to resources
# declared in the base itself. Re-declaring it here injects the
# same namespace into the overlay's new resources (postgres,
# rabbitmq, the plain Secret, and the generated rabbitmq-definitions
# ConfigMap) so they land alongside the app instead of defaulting
# to `default`. The Namespace resource itself is cluster-scoped and
# is unaffected.
namespace: go-micro-example

resources:
  - ../../base
  # K8S-003: in-cluster dependencies. Replace the cluster's "real"
  # Postgres / RabbitMQ / ExternalSecret with dev-only manifests so
  # the overlay produces a Ready pod without any operator install.
  - namespace.yaml
  - secret.yaml
  - postgres.yaml
  - rabbitmq.yaml
  # K8S-006: OTel collector. Receives the app's OTLP/gRPC spans and
  # prints them via the debug exporter — see otel-collector.yaml +
  # the OTEL_EXPORTER_OTLP_ENDPOINT patch in this file.
  - otel-collector.yaml
  # K8S-011: Loki + Promtail + Grafana. Promtail (DaemonSet) tails
  # the kubelet's pod logs and ships to Loki; Grafana provides the
  # Logs UI via a provisioned Loki datasource. Grafana's datasource
  # ConfigMap is the shared seam K8S-012 (metrics) appends a
  # Prometheus entry to.
  - loki.yaml
  - promtail.yaml
  - grafana.yaml

# RabbitMQ loads its exchanges/queues/bindings from
# scripts/rabbitmq/definitions.json on boot (DSN-015). Mounting the
# files via a kustomize-generated ConfigMap keeps a single source of
# truth between the docker-compose stack and this overlay; the
# content-hash suffix kustomize appends to the ConfigMap name means
# editing definitions triggers a rolling restart automatically.
configMapGenerator:
  - name: rabbitmq-definitions
    files:
      - ../../../scripts/rabbitmq/definitions.json
      - ../../../scripts/rabbitmq/rabbitmq.conf

# The base pod references `ghcr.io/sksmith/go-micro-example:latest`.
# Kustomize matches on the original name and rewrites both the
# repository and tag here.
images:
  - name: ghcr.io/sksmith/go-micro-example
    newName: go-micro-example
    newTag: dev

# `imagePullPolicy: Never` forces the kubelet to use the image that
# `kind load docker-image` placed in the node's containerd store.
# Without this override the kubelet would still try to pull from
# the (non-existent) registry and the pod would ErrImagePull.
#
# The `$patch: delete` block removes the base ExternalSecret. The
# external-secrets.io CRDs are not installed in the K8S-001 cluster
# (K8S-005's territory), and applying the resource would fail with
# "no matches for kind ExternalSecret". K8S-003 ships an in-cluster
# plain Secret (secret.yaml) with the same envFrom keys.
#
# The NetworkPolicy patch lets the K8S-004 load-test pod
# (`hack/k8s-loadtest.sh`) reach the app on :8080 — the base policy
# only allows ingress from `ingress-nginx` and `prometheus` labels.
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: go-micro-example
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: go-micro-example-secrets
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: go-micro-example-secrets
  - target:
      group: networking.k8s.io
      version: v1
      kind: NetworkPolicy
      name: go-micro-example
    patch: |-
      - op: add
        path: /spec/ingress/0/from/-
        value:
          podSelector:
            matchLabels:
              app.kubernetes.io/component: loadtest
  # K8S-006: point the app at the in-cluster collector and crank
  # sampling to 100% for smoke-test reproducibility. The base
  # ConfigMap keeps the production-friendly defaults (empty endpoint
  # → no-op exporter, 10% sampling) so a real overlay can re-patch
  # to its own collector address.
  - target:
      version: v1
      kind: ConfigMap
      name: go-micro-example-config
    patch: |-
      - op: replace
        path: /data/OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector:4317
      - op: replace
        path: /data/OTEL_TRACES_SAMPLER_ARG
        value: "1.0"
