# Local overlay: the one-and-only `make k8s-up` target renders this
# directory. Combines the in-cluster dependencies (Postgres /
# RabbitMQ), the OTel collector, every K8S-007..013 UI pod (Vault,
# RabbitMQ-mgmt, pgAdmin, Jaeger, Loki + Promtail + Grafana,
# Prometheus, Headlamp), and the real ESO + dev Vault flow so the
# base ExternalSecret resolves locally.
#
# ESO and the kube-network-policies enforcer install in their own
# namespaces and ship with cluster-scoped resources, so they're
# applied separately by the Makefile (server-side, before the
# kustomize render) — they're not listed here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# The base's `namespace:` directive only applies to resources
# declared in the base itself. Re-declaring it here injects the same
# namespace into the overlay's new resources so they land alongside
# the app instead of defaulting to `default`. The Namespace resource
# itself is cluster-scoped and is unaffected.
namespace: go-micro-example

resources:
  - ../../base
  # Namespace + dev dependencies (Postgres, RabbitMQ).
  - namespace.yaml
  - postgres.yaml
  - rabbitmq.yaml
  # OTel collector. Receives the app's OTLP/gRPC spans and forwards
  # them to the `debug` exporter (stdout) and Jaeger (UI). See
  # otel-collector.yaml + the OTEL_EXPORTER_OTLP_ENDPOINT patch
  # below.
  - otel-collector.yaml
  # Real ESO flow against an in-cluster dev Vault. Vault runs in
  # dev-mode (root token `root`, in-memory KV storage); the
  # bootstrap Job seeds the kv paths the base ExternalSecret reads.
  # The `ClusterSecretStore` (`vault-backend`) points ESO at this
  # Vault. ESO itself (the operator + CRDs + webhook) is applied
  # out-of-band by the Makefile because the CRD bundle exceeds
  # kubectl's annotation size limit and needs server-side apply.
  - vault.yaml
  - secretstore.yaml
  - bootstrap-job.yaml
  # UI pods (K8S-009..013). Each is independent — pull whichever you
  # care about via `kubectl port-forward svc/<name>` once `k8s-up`
  # finishes (see deploy/README.md for the service-name table).
  - pgadmin.yaml
  - jaeger.yaml
  - loki.yaml
  - promtail.yaml
  - grafana.yaml
  - prometheus.yaml
  - headlamp.yaml

# RabbitMQ loads its exchanges/queues/bindings from
# scripts/rabbitmq/definitions.json on boot (DSN-015). Mounting the
# files via a kustomize-generated ConfigMap keeps a single source of
# truth between the docker-compose stack and this overlay; the
# content-hash suffix kustomize appends to the ConfigMap name means
# editing definitions triggers a rolling restart automatically.
configMapGenerator:
  - name: rabbitmq-definitions
    files:
      - ../../../scripts/rabbitmq/definitions.json
      - ../../../scripts/rabbitmq/rabbitmq.conf

# The base pod references `ghcr.io/sksmith/go-micro-example:latest`.
# Kustomize matches on the original name and rewrites both the
# repository and tag here.
images:
  - name: ghcr.io/sksmith/go-micro-example
    newName: go-micro-example
    newTag: dev

# `imagePullPolicy: Never` forces the kubelet to use the image that
# `kind load docker-image` placed in the node's containerd store.
# Without this override the kubelet would still try to pull from
# the (non-existent) registry and the pod would ErrImagePull.
#
# The NetworkPolicy patch lets the busybox load-test recipe in the
# README reach the app on :8080 — the base policy only allows
# ingress from `ingress-nginx` and `prometheus` labels.
#
# The OTel collector patch points the app at the in-cluster collector
# Service and cranks sampling to 100% so smoke tests see every span.
# The base ConfigMap keeps the production-friendly defaults (empty
# endpoint → no-op exporter, 10% sampling) so a real overlay can
# re-patch to its own collector address.
#
# The ExternalSecret refreshInterval patch drops the cadence from 1h
# (the base default for production) to 30s so the unhappy-path demo
# (kill Vault, observe SecretSyncedError) is interactive locally.
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: go-micro-example
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  - target:
      group: networking.k8s.io
      version: v1
      kind: NetworkPolicy
      name: go-micro-example
    patch: |-
      - op: add
        path: /spec/ingress/0/from/-
        value:
          podSelector:
            matchLabels:
              app.kubernetes.io/component: loadtest
  - target:
      version: v1
      kind: ConfigMap
      name: go-micro-example-config
    patch: |-
      - op: replace
        path: /data/OTEL_EXPORTER_OTLP_ENDPOINT
        value: http://otel-collector:4317
      - op: replace
        path: /data/OTEL_TRACES_SAMPLER_ARG
        value: "1.0"
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: go-micro-example-secrets
    patch: |-
      - op: replace
        path: /spec/refreshInterval
        value: 30s
