# K8S-012: in-cluster Prometheus for the local overlay. Single
# replica, in-memory TSDB on an emptyDir, no remote_write — sized
# for the dev loop. Annotation-driven scrape so the OPS-004 base
# `prometheus.io/scrape` / `prometheus.io/port` / `prometheus.io/path`
# annotations are sufficient; no ServiceMonitor / PodMonitor CRDs
# required.
#
# The pod carries `app.kubernetes.io/name: prometheus` which matches
# the base NetworkPolicy's ingress allow-list for :8080, so the
# scrape path to the app pod is unconstrained by the policy.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: go-micro-example
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Annotation-driven pod scrape: any pod with
      # `prometheus.io/scrape: "true"` is included; `prometheus.io/port`
      # selects the port and `prometheus.io/path` selects the metrics
      # path. The OPS-004 base sets all three on the app's pod
      # template, so the app shows up here with zero per-target
      # config.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            action: replace
            target_label: container

      # Scrape Prometheus itself so the Targets page has at least one
      # always-up entry while the dev cluster boots.
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  # NodePort so kind's extraPortMappings can publish the expression
  # browser on http://localhost:9090.
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        # The base NetworkPolicy admits ingress to the app's :8080
        # from any pod carrying this label, so the scrape path works
        # out of the box.
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      # Prometheus 3.x runs as UID 65534 (nobody).
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.6.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            # Short retention — local dev doesn't need history beyond
            # the current session.
            - --storage.tsdb.retention.time=2h
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
