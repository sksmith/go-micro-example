port: 8080
profile: test

config:
  source: local
  print: false

log:
  level: debug
  structured: false

db:
  name: go-micro-example-db
  host: localhost
  port: 5432
  # user / pass: integration tests must supply GME_DB_USER, GME_DB_PASS.
  migrate: true
  migrationFolder: ../internal/platform/persistence/migrations
  clean: true
  logLevel: warn
  pool:
    minSize: 1
    maxSize: 3

rabbitmq:
  host: localhost
  port: 5672
  # user / pass: integration tests must supply GME_RABBITMQ_USER, GME_RABBITMQ_PASS.
  inventory:
    exchange: inventory.exchange
  reservation:
    exchange: reservation.exchange
  product:
    queue: product.queue
    dlt:
      exchange: product.dlt.exchange
